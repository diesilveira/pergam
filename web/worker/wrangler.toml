name = "pergam-share"
main = "src/index.ts"
compatibility_date = "2026-04-01"

# Worker is exposed at api.pergam.dev. The custom_domain flag tells
# Cloudflare to manage the DNS record automatically.
routes = [
  { pattern = "api.pergam.dev", custom_domain = true }
]

# Bind the KV namespace. Create it with:
#   wrangler kv namespace create pergam_shares
# then paste the id below.
[[kv_namespaces]]
binding = "KV"
id = "5ef569bfb5a2461b91959bb0b97f6075"

# Cloudflare Rate Limiting bindings. Backed by CF's distributed counters
# (not KV), so they cost nothing against the KV write budget and survive
# write-budget exhaustion. The `simple` form only accepts period = 10 or 60.
#
# RL_POST_COOLDOWN: 1 share per 60s per IP. Kills repeated POSTs cheaply
# before any KV work happens.
[[unsafe.bindings]]
name = "RL_POST_COOLDOWN"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 1, period = 60 }

# RL_GET: 60 GETs per 60s per IP on cache misses. Cache hits skip this
# check entirely (the Worker reads the response from the edge cache).
[[unsafe.bindings]]
name = "RL_GET"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

# Production environment.
# Set ALLOWED_ORIGIN to your frontend origin to restrict CORS.
[vars]
ALLOWED_ORIGIN = "https://pergam.dev"
