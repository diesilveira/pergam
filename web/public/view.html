<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shared pergam</title>
<meta name="description" content="A pergam shared via pergam.dev. Expires in 72 hours.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0d1117">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/styles.css">
</head>
<body class="viewer-page">

<div class="viewer-bar" id="viewer-bar">
  <div class="vb-left">
    <a href="/" class="vb-logo" title="pergam"><span class="logo">▮▮</span><span class="name">pergam</span></a>
    <span class="vb-divider">·</span>
    <strong id="vb-title">loading…</strong>
    <span class="vb-divider">·</span>
    <span class="muted small" id="vb-expiry"></span>
  </div>
  <div class="vb-right">
    <a id="vb-download" class="btn btn--ghost" target="_blank" rel="noopener" hidden>Download</a>
    <a href="/" class="btn btn--ghost">Make your own</a>
  </div>
</div>

<div class="abuse-banner" id="abuse-banner" hidden role="alert">
  <span class="abuse-banner__icon" aria-hidden="true">⚠</span>
  <div class="abuse-banner__text">
    <strong id="abuse-banner-title">Don't enter sensitive data here.</strong>
    <span id="abuse-banner-msg">pergam never asks for passwords, payment details, or personal data. This is user-submitted content.</span>
  </div>
  <button class="abuse-banner__close" id="abuse-banner-close" type="button" aria-label="Dismiss warning">×</button>
</div>

<iframe id="viewer-frame" sandbox="allow-scripts" referrerpolicy="no-referrer"></iframe>

<div class="viewer-empty" id="viewer-empty" hidden>
  <h2 id="empty-title">Not found</h2>
  <p id="empty-msg" class="muted">This link doesn't exist or has expired.</p>
  <a href="/" class="btn btn--primary">Back to pergam</a>
</div>

<script src="/app.js"></script>
</body>
</html>
